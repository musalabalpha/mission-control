name: Star Chart

# Refresh the self-hosted star-history SVGs weekly. Self-hosted so the
# README chart stays correct regardless of third-party chart services.

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Generate charts
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/gen-star-history.py "$GITHUB_REPOSITORY" docs/star-history

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/star-history-light.svg docs/star-history-dark.svg; then
            echo "No chart changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/star-history-light.svg docs/star-history-dark.svg
          git commit -m "chore: refresh star-history charts"
          git push
